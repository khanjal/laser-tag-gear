<main class="mx-auto min-h-screen max-w-6xl px-4 py-6 sm:px-6 lg:px-8">
  <header class="mb-6 rounded-2xl border border-ops-grid bg-ops-surface/90 p-4 shadow-scan sm:p-6">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <a routerLink="/" class="font-display text-xl uppercase tracking-[0.16em] text-ops-ink sm:text-2xl">
        Laser Tag Gear
      </a>

      <nav class="flex flex-wrap gap-2 text-base font-bold uppercase tracking-[0.1em]">
        <a
          routerLink="/"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="bg-ops-ink text-ops-paper"
          class="rounded-md border border-ops-grid bg-white/80 px-3 py-1.5 text-ops-ink"
          >Home</a
        >
        <a
          routerLink="/catalog"
          routerLinkActive="bg-ops-ink text-ops-paper"
          class="rounded-md border border-ops-grid bg-white/80 px-3 py-1.5 text-ops-ink"
          >Catalog</a
        >
      </nav>
    </div>
  </header>

  <router-outlet />
</main>
