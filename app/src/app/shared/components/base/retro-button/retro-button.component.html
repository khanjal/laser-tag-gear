<button
  [type]="type"
  [disabled]="disabled || loading"
  [class]="buttonClasses"
  (click)="onButtonClick()">
  
  <!-- Loading spinner -->
  <span *ngIf="loading" class="retro-button__spinner" aria-hidden="true">
    <svg class="animate-spin" viewBox="0 0 24 24" fill="none">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </span>

  <!-- Icon left -->
  <span *ngIf="icon && iconPosition === 'left' && !loading" class="material-symbols-outlined retro-button__icon" aria-hidden="true">
    {{ icon }}
  </span>

  <!-- Button text content -->
  <span class="retro-button__text">
    <ng-content></ng-content>
  </span>

  <!-- Icon right -->
  <span *ngIf="icon && iconPosition === 'right' && !loading" class="material-symbols-outlined retro-button__icon" aria-hidden="true">
    {{ icon }}
  </span>
</button>
